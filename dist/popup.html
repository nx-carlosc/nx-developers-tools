<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="styles.css">
  <script defer src="popup.js" type="module"></script>
</head>

<body>
  <main>
    <h1>nx-developers-tools</h1>
    <section>
      <form>
        <div class="domain-input-button">
          <input type="url" list="domains" name="domain" id="replaceDomainInput" placeholder="https://mydomain.com">
          <div id="removeDomainButton">
            <svg width="18px" height="18px" viewBox="0 0 24 24">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="crimson">
              </path>
            </svg>
          </div>
        </div>
        <datalist id="domains">
        </datalist>
        <button id="replaceDomainButton" class="blue-button">
          Replace Domain
        </button>
      </form>
      <div class="message"></div>
    </section>
    <section id="branchGenerator" class="hidden">
      <div class="jira-data">
        <picture>
          <img class="hidden" id="jiraAvatar">
        </picture>
        <div class="jira-data-items">
          <div class="jira-data-item jira-data-type">
            $0(type):
            <select id="branchType"></select>
            <button id="addBranchTypeButton" title="Add type">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="cornflowerblue"/></svg>
            </button>
            <button id="removeBranchTypeButton" title="Remove type">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z" fill="crimson"/></svg>
            </button>
          </div>
          <div class="jira-data-item">
            $1(project): <span id="jiraProject"></span>
          </div>
          <div class="jira-data-item">
            $2(ticket): <span id="jiraTicket"></span>
          </div>
          <div class="jira-data-item">
            $3(title): <span id="jiraTitle"></span>
          </div>
        </div>
      </div>
      <div id="addTypeForm" class="hidden">
        <input type="text" id="newTypeInput" placeholder="new type" maxlength="20">
        <button id="saveNewTypeButton" class="blue-button">Add</button>
      </div>
      <div class="branch" id="branchName">
        <div class="branch-field">
          <label class="branch-label" for="branchInput">branch</label>
          <input type="text" id="branchInput" maxlength="124" placeholder="$0$2-$3">
        </div>
        <div class="branch-field">
          <label class="branch-label" for="charReplacer">divider</label>
          <input type="text" id="charReplacer" maxlength="1" placeholder="-">
        </div>
      </div>
      <div id="branchResult">
        <div class="result-text-wrapper">
          <div id="branchResultValue" contenteditable="true" spellcheck="false"></div>
          <div id="copiedFeedback" class="hidden">Copied to clipboard!</div>
        </div>
        <button id="copyBranchName" class="flex">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path
              d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
              fill="white"></path>
          </svg>
        </button>
      </div>
    </section>
  </main>
  <div id="manifestVersion"></div>
</body>

</html>
